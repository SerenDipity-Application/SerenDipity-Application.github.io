version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: serendipity
      POSTGRES_USER: serendipity
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serendipity -d serendipity"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: always
    expose:
      - "8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://serendipity:${DB_PASSWORD:-change-me}@db:5432/serendipity
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

volumes:
  pgdata:
