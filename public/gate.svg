<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 160" fill="none">
  <defs>
    <style>
      .g { stroke:#C9A84C; stroke-width:1.2; fill:none; }
      .gf { stroke:#C9A84C; stroke-width:1; fill:rgba(201,168,76,0.08); }
      .gt { fill:#C9A84C; opacity:0.85; }
    </style>
  </defs>

  <!-- ═══════════════════════════════════════════
       LEFT COLLEGE BUILDING
  ═══════════════════════════════════════════ -->

  <!-- Far-left low wing -->
  <rect x="0" y="95" width="55" height="65" class="gf"/>
  <line x1="0"  y1="95" x2="55" y2="95" class="g"/>
  <!-- battlements -->
  <rect x="2"  y="88" width="8" height="8" class="gf"/>
  <rect x="14" y="88" width="8" height="8" class="gf"/>
  <rect x="26" y="88" width="8" height="8" class="gf"/>
  <rect x="38" y="88" width="8" height="8" class="gf"/>
  <rect x="50" y="88" width="8" height="8" class="gf"/>
  <!-- windows -->
  <rect x="8"  y="105" width="10" height="16" class="g"/>
  <rect x="25" y="105" width="10" height="16" class="g"/>
  <rect x="42" y="105" width="10" height="16" class="g"/>
  <!-- pointed window tops -->
  <path d="M8 105 Q13 98 18 105"  class="g"/>
  <path d="M25 105 Q30 98 35 105" class="g"/>
  <path d="M42 105 Q47 98 52 105" class="g"/>

  <!-- Left main tower -->
  <rect x="55" y="50" width="50" height="110" class="gf"/>
  <!-- Tower battlements -->
  <rect x="55" y="40" width="9"  height="12" class="gf"/>
  <rect x="68" y="40" width="9"  height="12" class="gf"/>
  <rect x="81" y="40" width="9"  height="12" class="gf"/>
  <rect x="94" y="40" width="9"  height="12" class="gf"/>
  <!-- Tall spire on left tower -->
  <line x1="79" y1="40" x2="79" y2="8" class="g" stroke-width="1.5"/>
  <polygon points="79,4 74,40 84,40" class="gf" stroke="#C9A84C" stroke-width="1"/>
  <!-- Cross at spire top -->
  <line x1="79" y1="4"  x2="79" y2="14" class="g" stroke-width="1"/>
  <line x1="75" y1="8"  x2="83" y2="8"  class="g" stroke-width="1"/>
  <!-- Tower windows -->
  <rect x="63" y="65"  width="14" height="22" class="g"/>
  <path d="M63 65 Q70 56 77 65" class="g"/>
  <rect x="83" y="65"  width="14" height="22" class="g"/>
  <path d="M83 65 Q90 56 97 65" class="g"/>
  <rect x="63" y="100" width="14" height="20" class="g"/>
  <path d="M63 100 Q70 93 77 100" class="g"/>
  <rect x="83" y="100" width="14" height="20" class="g"/>
  <path d="M83 100 Q90 93 97 100" class="g"/>
  <!-- Door arch -->
  <rect x="67" y="130" width="16" height="30" class="g"/>
  <path d="M67 130 Q75 120 83 130" class="g"/>

  <!-- Left connector wing to gate -->
  <rect x="105" y="75" width="70" height="85" class="gf"/>
  <!-- Small turret on connector -->
  <rect x="108" y="63" width="22" height="14" class="gf"/>
  <rect x="109" y="58" width="6"  height="6"  class="gf"/>
  <rect x="118" y="58" width="6"  height="6"  class="gf"/>
  <rect x="127" y="58" width="6"  height="6"  class="gf"/>
  <line x1="118" y1="58" x2="118" y2="44" class="g" stroke-width="1.2"/>
  <polygon points="118,40 114,58 122,58" class="gf" stroke="#C9A84C" stroke-width="0.9"/>
  <!-- Connector windows -->
  <rect x="112" y="86"  width="12" height="18" class="g"/>
  <path d="M112 86 Q118 79 124 86" class="g"/>
  <rect x="132" y="86"  width="12" height="18" class="g"/>
  <path d="M132 86 Q138 79 144 86" class="g"/>
  <rect x="112" y="116" width="12" height="18" class="g"/>
  <rect x="132" y="116" width="12" height="18" class="g"/>

  <!-- ═══════════════════════════════════════════
       CENTRAL GATE / ARCH
  ═══════════════════════════════════════════ -->

  <!-- Gate pillars -->
  <rect x="175" y="60" width="22" height="100" class="gf" stroke-width="1.4"/>
  <rect x="503" y="60" width="22" height="100" class="gf" stroke-width="1.4"/>

  <!-- Pillar caps -->
  <rect x="172" y="55" width="28" height="8" class="gf" stroke-width="1.2"/>
  <rect x="500" y="55" width="28" height="8" class="gf" stroke-width="1.2"/>

  <!-- Pillar finials -->
  <polygon points="186,44 181,56 191,56" class="gf" stroke="#C9A84C" stroke-width="1"/>
  <line x1="186" y1="38" x2="186" y2="44" class="g" stroke-width="1.3"/>
  <polygon points="514,44 509,56 519,56" class="gf" stroke="#C9A84C" stroke-width="1"/>
  <line x1="514" y1="38" x2="514" y2="44" class="g" stroke-width="1.3"/>

  <!-- Main arch curve -->
  <path d="M175 98 Q175 28 350 22 Q525 28 525 98" class="g" stroke-width="2"/>

  <!-- Inner arch (decorative inset) -->
  <path d="M185 100 Q185 44 350 38 Q515 44 515 100" class="g" stroke-width="1"/>

  <!-- Arch ornamental scrollwork left -->
  <path d="M175 98 Q190 80 200 70 Q210 62 220 68 Q228 74 220 82 Q212 88 205 82 Q200 76 207 72" class="g" stroke-width="1"/>
  <path d="M185 100 Q196 85 202 78" class="g" stroke-width="0.8" opacity="0.7"/>

  <!-- Arch ornamental scrollwork right -->
  <path d="M525 98 Q510 80 500 70 Q490 62 480 68 Q472 74 480 82 Q488 88 495 82 Q500 76 493 72" class="g" stroke-width="1"/>
  <path d="M515 100 Q504 85 498 78" class="g" stroke-width="0.8" opacity="0.7"/>

  <!-- Central ironwork verticals -->
  <line x1="280" y1="100" x2="280" y2="60" class="g"/>
  <line x1="300" y1="100" x2="300" y2="48" class="g"/>
  <line x1="320" y1="100" x2="320" y2="40" class="g"/>
  <line x1="340" y1="100" x2="340" y2="36" class="g"/>
  <line x1="350" y1="100" x2="350" y2="34" class="g"/>
  <line x1="360" y1="100" x2="360" y2="36" class="g"/>
  <line x1="380" y1="100" x2="380" y2="40" class="g"/>
  <line x1="400" y1="100" x2="400" y2="48" class="g"/>
  <line x1="420" y1="100" x2="420" y2="60" class="g"/>
  <!-- Horizontal rail -->
  <line x1="197" y1="100" x2="503" y2="100" class="g" stroke-width="1.3"/>
  <line x1="197" y1="112" x2="503" y2="112" class="g" stroke-width="0.8"/>
  <!-- Ironwork curls at top of each vertical -->
  <circle cx="280" cy="60" r="3" class="g"/>
  <circle cx="300" cy="48" r="3" class="g"/>
  <circle cx="320" cy="40" r="3" class="g"/>
  <circle cx="340" cy="36" r="3" class="g"/>
  <circle cx="360" cy="36" r="3" class="g"/>
  <circle cx="380" cy="40" r="3" class="g"/>
  <circle cx="400" cy="48" r="3" class="g"/>
  <circle cx="420" cy="60" r="3" class="g"/>

  <!-- Crown shield at top of arch -->
  <path d="M350 12 L366 18 L366 32 Q366 42 350 48 Q334 42 334 32 L334 18 Z"
        fill="rgba(201,168,76,0.12)" stroke="#C9A84C" stroke-width="1.3"/>
  <text x="350" y="33" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia,serif" font-size="12" font-style="italic"
        fill="#C9A84C" opacity="0.9">S</text>
  <!-- Small cross above shield -->
  <line x1="350" y1="4"  x2="350" y2="12" class="g" stroke-width="1.2"/>
  <line x1="347" y1="7"  x2="353" y2="7"  class="g" stroke-width="1.2"/>

  <!-- Gate base steps -->
  <rect x="170" y="155" width="360" height="5" class="gf" stroke-width="0.8"/>

  <!-- ═══════════════════════════════════════════
       RIGHT COLLEGE BUILDING (mirror of left)
  ═══════════════════════════════════════════ -->

  <!-- Right connector wing -->
  <rect x="525" y="75" width="70" height="85" class="gf"/>
  <rect x="570" y="63" width="22" height="14" class="gf"/>
  <rect x="571" y="58" width="6"  height="6"  class="gf"/>
  <rect x="580" y="58" width="6"  height="6"  class="gf"/>
  <rect x="589" y="58" width="6"  height="6"  class="gf"/>
  <line x1="582" y1="58" x2="582" y2="44" class="g" stroke-width="1.2"/>
  <polygon points="582,40 578,58 586,58" class="gf" stroke="#C9A84C" stroke-width="0.9"/>
  <rect x="532" y="86"  width="12" height="18" class="g"/>
  <path d="M532 86 Q538 79 544 86" class="g"/>
  <rect x="556" y="86"  width="12" height="18" class="g"/>
  <path d="M556 86 Q562 79 568 86" class="g"/>
  <rect x="532" y="116" width="12" height="18" class="g"/>
  <rect x="556" y="116" width="12" height="18" class="g"/>

  <!-- Right main tower -->
  <rect x="595" y="50" width="50" height="110" class="gf"/>
  <rect x="595" y="40" width="9"  height="12" class="gf"/>
  <rect x="608" y="40" width="9"  height="12" class="gf"/>
  <rect x="621" y="40" width="9"  height="12" class="gf"/>
  <rect x="634" y="40" width="9"  height="12" class="gf"/>
  <line x1="621" y1="40" x2="621" y2="8" class="g" stroke-width="1.5"/>
  <polygon points="621,4 616,40 626,40" class="gf" stroke="#C9A84C" stroke-width="1"/>
  <line x1="621" y1="4"  x2="621" y2="14" class="g" stroke-width="1"/>
  <line x1="617" y1="8"  x2="625" y2="8"  class="g" stroke-width="1"/>
  <rect x="603" y="65"  width="14" height="22" class="g"/>
  <path d="M603 65 Q610 56 617 65" class="g"/>
  <rect x="623" y="65"  width="14" height="22" class="g"/>
  <path d="M623 65 Q630 56 637 65" class="g"/>
  <rect x="603" y="100" width="14" height="20" class="g"/>
  <path d="M603 100 Q610 93 617 100" class="g"/>
  <rect x="623" y="100" width="14" height="20" class="g"/>
  <path d="M623 100 Q630 93 637 100" class="g"/>
  <rect x="611" y="130" width="16" height="30" class="g"/>
  <path d="M611 130 Q619 120 627 130" class="g"/>

  <!-- Far-right low wing -->
  <rect x="645" y="95" width="55" height="65" class="gf"/>
  <line x1="645" y1="95" x2="700" y2="95" class="g"/>
  <rect x="647" y="88" width="8" height="8" class="gf"/>
  <rect x="659" y="88" width="8" height="8" class="gf"/>
  <rect x="671" y="88" width="8" height="8" class="gf"/>
  <rect x="683" y="88" width="8" height="8" class="gf"/>
  <rect x="695" y="88" width="5" height="8" class="gf"/>
  <rect x="650" y="105" width="10" height="16" class="g"/>
  <rect x="667" y="105" width="10" height="16" class="g"/>
  <rect x="684" y="105" width="10" height="16" class="g"/>
  <path d="M650 105 Q655 98 660 105" class="g"/>
  <path d="M667 105 Q672 98 677 105" class="g"/>
  <path d="M684 105 Q689 98 694 105" class="g"/>

  <!-- Ground line -->
  <line x1="0" y1="160" x2="700" y2="160" stroke="#C9A84C" stroke-width="0.6" opacity="0.3"/>
</svg>
