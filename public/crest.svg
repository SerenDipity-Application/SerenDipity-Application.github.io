    <path d="M36 160 Q24 158 27 146 Q37 147 36 160Z" fill="#C9A84C" opacity="0.7"/>
    <path d="M42 173 Q31 174 32 161 Q43 160 42 173Z" fill="#C9A84C" opacity="0.65"/>
    <path d="M50 115 Q45 105 51 96 Q58 103 50 115Z" fill="#C9A84C" opacity="0.7"/>
