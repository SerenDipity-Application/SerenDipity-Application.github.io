    <!-- Stem -->
    <path d="M50 96 Q42 120 45 175" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Laurel right -->
  <g stroke="#C9A84C" stroke-width="1.2" fill="none" opacity="0.9">
    <path d="M162 130 Q170 122 166 112 Q158 118 162 130Z" fill="#C9A84C" opacity="0.7"/>
    <path d="M165 145 Q176 140 175 128 Q164 131 165 145Z" fill="#C9A84C" opacity="0.7"/>
    <path d="M164 160 Q176 158 173 146 Q163 147 164 160Z" fill="#C9A84C" opacity="0.7"/>
    <path d="M158 173 Q169 174 168 161 Q157 160 158 173Z" fill="#C9A84C" opacity="0.65"/>
    <path d="M150 115 Q155 105 149 96 Q142 103 150 115Z" fill="#C9A84C" opacity="0.7"/>
