  <!-- Bottom laurel berries -->
  <circle cx="65" cy="180" r="3" fill="#C9A84C" opacity="0.8"/>
  <circle cx="72" cy="186" r="2.5" fill="#C9A84C" opacity="0.7"/>
  <circle cx="80" cy="190" r="2" fill="#C9A84C" opacity="0.6"/>
  <circle cx="135" cy="180" r="3" fill="#C9A84C" opacity="0.8"/>
  <circle cx="128" cy="186" r="2.5" fill="#C9A84C" opacity="0.7"/>
  <circle cx="120" cy="190" r="2" fill="#C9A84C" opacity="0.6"/>

  <!-- Letter S -->
  <text x="100" y="145" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia, serif" font-size="72" font-style="italic"
        fill="#C9A84C" opacity="0.95">S</text>

  <!-- Bottom divider line -->
  <line x1="60" y1="195" x2="140" y2="195" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
